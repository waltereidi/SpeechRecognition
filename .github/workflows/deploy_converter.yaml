name: Deploy .NET 10 App (EC2 SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧱 Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 📦 Restore
        run: dotnet restore SpeechRecognition.AudioConverter.API/SpeechRecognition.AudioConverter.Api.csproj

      - name: 🏗️ Build
        run: dotnet build SpeechRecognition.AudioConverter.API/SpeechRecognition.AudioConverter.Api.csproj --configuration Release --no-restore

      - name: 📤 Publish
        run: dotnet publish SpeechRecognition.AudioConverter.API/SpeechRecognition.AudioConverter.Api.csproj -c Release -o publish

      - name: 📦 Compactar arquivos
        run: tar -czf deploy.tar.gz -C publish .

      - name: 📡 Enviar arquivos para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/home/ubuntu/app"

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            APP_DIR=/home/ubuntu/app

            echo "📁 Criando diretório"
            mkdir -p $APP_DIR

            cd $APP_DIR

            echo "📦 Extraindo arquivos"
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "🛑 Parando aplicação antiga"
            pkill -f "SpeechRecognition.AudioConverter.Api.dll" || true

            echo "🚀 Subindo aplicação"
            nohup dotnet SpeechRecognition.AudioConverter.Api.dll > app.log 2>&1 &